<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Panorama der Stadt Regelreich mit Stadtschild und digitalen Anzeigen">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ecff"/>
      <stop offset="55%" stop-color="#e7f7ff"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b6d3b5"/>
      <stop offset="100%" stop-color="#8fb58d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9f4ff"/>
      <stop offset="100%" stop-color="#a7d0ea"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#16344d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <ellipse cx="1650" cy="170" rx="120" ry="120" fill="#fff9d9" opacity="0.85"/>

  <g opacity="0.75">
    <rect x="90" y="320" width="210" height="280" rx="12" fill="#dfe9f1"/>
    <rect x="330" y="260" width="270" height="360" rx="14" fill="#d5e3ee"/>
    <rect x="620" y="300" width="220" height="310" rx="12" fill="#d8e6ef"/>
    <rect x="870" y="250" width="290" height="390" rx="18" fill="#cfdeea"/>
    <rect x="1200" y="290" width="240" height="330" rx="12" fill="#dce9f2"/>
    <rect x="1460" y="245" width="300" height="395" rx="16" fill="#d2e2ee"/>
    <rect x="1780" y="330" width="110" height="260" rx="10" fill="#d9e8f3"/>
  </g>

  <g>
    <rect x="360" y="350" width="210" height="160" rx="10" fill="url(#glass)"/>
    <rect x="395" y="350" width="8" height="160" fill="#91bdd8" opacity="0.65"/>
    <rect x="434" y="350" width="8" height="160" fill="#91bdd8" opacity="0.65"/>
    <rect x="473" y="350" width="8" height="160" fill="#91bdd8" opacity="0.65"/>
    <rect x="512" y="350" width="8" height="160" fill="#91bdd8" opacity="0.65"/>

    <rect x="905" y="330" width="220" height="250" rx="14" fill="url(#glass)"/>
    <rect x="948" y="330" width="8" height="250" fill="#91bdd8" opacity="0.6"/>
    <rect x="991" y="330" width="8" height="250" fill="#91bdd8" opacity="0.6"/>
    <rect x="1034" y="330" width="8" height="250" fill="#91bdd8" opacity="0.6"/>

    <rect x="1490" y="320" width="230" height="270" rx="14" fill="url(#glass)"/>
    <rect x="1534" y="320" width="8" height="270" fill="#91bdd8" opacity="0.6"/>
    <rect x="1578" y="320" width="8" height="270" fill="#91bdd8" opacity="0.6"/>
    <rect x="1622" y="320" width="8" height="270" fill="#91bdd8" opacity="0.6"/>
  </g>

  <rect y="670" width="1920" height="410" fill="url(#ground)"/>

  <g filter="url(#softShadow)">
    <rect x="1190" y="560" width="570" height="140" rx="14" fill="#153851"/>
    <rect x="1210" y="580" width="530" height="100" rx="10" fill="#0f2d42"/>
    <text x="1475" y="618" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="#89e2ff">DIGITALE BÜRGERINFO</text>
    <text x="1475" y="655" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="#d9f6ff">Abstimmung zur neuen Parkbank-Regelung läuft</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="130" y="510" width="96" height="285" fill="#8f9aa4"/>
    <rect x="440" y="510" width="96" height="285" fill="#8f9aa4"/>
    <rect x="95" y="430" width="480" height="180" rx="14" fill="#1d6fa3"/>
    <rect x="114" y="448" width="442" height="142" rx="10" fill="#2087c2"/>
    <text x="335" y="515" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Willkommen in</text>
    <text x="335" y="562" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff">REGELREICH</text>
  </g>

  <g opacity="0.45">
    <circle cx="790" cy="745" r="9" fill="#6c8f6a"/>
    <circle cx="840" cy="760" r="8" fill="#6c8f6a"/>
    <circle cx="890" cy="742" r="10" fill="#6c8f6a"/>
    <circle cx="950" cy="758" r="9" fill="#6c8f6a"/>
  </g>
</svg>
